name: drogueriaaldemar

services:
  php:
    build: .
    container_name: drogueriaaldemar_php
    working_dir: /var/www/html
    volumes:
      - ./public:/var/www/html
      - ./php-config/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - drogueriaaldemar_network
      - traefik_network
    restart: unless-stopped
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: drogueriaaldemar_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: drogueriaaldemar_db
      MYSQL_USER: drogueriaaldemar_user
      MYSQL_PASSWORD: drogueriaaldemar2024
    volumes:
      - drogueriaaldemar_mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - drogueriaaldemar_network

  nginx:
    image: nginx:alpine
    container_name: drogueriaaldemar_nginx
    restart: unless-stopped
    volumes:
      - ./public:/var/www/html
      - ./nginx-traefik.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt/live/drogueriaaldemar.com:/etc/letsencrypt/live/drogueriaaldemar.com:ro
      - /etc/letsencrypt/archive/drogueriaaldemar.com:/etc/letsencrypt/archive/drogueriaaldemar.com:ro
    depends_on:
      - php
    networks:
      - drogueriaaldemar_network
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      
      # HTTP Router (redirect to HTTPS)
      - "traefik.http.routers.aldemar-http.rule=Host(`drogueriaaldemar.com`) || Host(`www.drogueriaaldemar.com`)"
      - "traefik.http.routers.aldemar-http.entrypoints=web"
      - "traefik.http.routers.aldemar-http.middlewares=aldemar-redirect-https"
      
      # HTTPS Router
      - "traefik.http.routers.aldemar-https.rule=Host(`drogueriaaldemar.com`) || Host(`www.drogueriaaldemar.com`)"
      - "traefik.http.routers.aldemar-https.entrypoints=websecure"
      - "traefik.http.routers.aldemar-https.tls=true"
      - "traefik.http.routers.aldemar-https.tls.certresolver=letsencrypt"
      
      # Service
      - "traefik.http.services.aldemar-service.loadbalancer.server.port=80"
      
      # Middlewares
      - "traefik.http.middlewares.aldemar-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.aldemar-redirect-https.redirectscheme.permanent=true"

networks:
  drogueriaaldemar_network:
    driver: bridge
  traefik_network:
    external: true

volumes:
  drogueriaaldemar_mysql_data:
